<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; display: flex; justify-content: center; padding: 20px; }
        #canvas { width: 100%; max-width: 720px; background: white; border-radius: 45px; padding: 35px; box-shadow: 0 30px 60px rgba(0,0,0,0.1); }
        .live-banner { background: #0f172a; color: white; border-radius: 35px; text-align: center; padding: 35px; margin-bottom: 25px; border: 5px solid #ef4444; transition: 0.5s; animation: p 3s infinite ease-in-out; }
        @keyframes p { 0% { transform: scale(1); box-shadow: 0 0 0 0 #ef4444b3; } 50% { transform: scale(1.01); box-shadow: 0 0 20px 5px #ef444466; } 100% { transform: scale(1); } }
        .big-date { font-size: 48px; font-weight: 900; color: #38bdf8; margin-bottom: 10px; }
        .live-name { font-size: 28px; font-weight: 800; color: #ffffff; }
        .priority-box { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .p-card { background: #475569; padding: 15px; border-radius: 28px; color: white; text-align: center; min-height: 180px; }
        .p-info { background: rgba(255,255,255,0.1); padding: 12px 5px; border-radius: 18px; margin-bottom: 8px; }
        .row { padding: 15px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; transition: 0.3s; }
        .today-row { background: #fef2f2 !important; border-left: 8px solid #ef4444 !important; border-radius: 0 20px 20px 0; }
        .btn-m { text-decoration: none; padding: 8px 15px; border-radius: 10px; font-weight: 800; display: inline-block; margin: 2px; background: #16a34a; color: white; font-size: 10px; }
        .btn-viber { background: #7360f2 !important; }
        #noteBox { border-left: 8px solid #ef4444 !important; }
    </style>
</head>
<body>
    <div id="canvas">
        
        <div id="liveBanner" class="live-banner">
            <div id="liveD" class="big-date">იტვირთება...</div>
            <div id="liveN" class="live-name">იტვირთება...</div>
            <a id="liveP" href="#" style="font-size: 32px; color: rgb(56, 189, 248); font-weight: 900; text-decoration: none; display: block; margin: 10px 0px;">---</a>
            <div style="display:flex; gap:15px; justify-content:center; margin-top:10px;">
                <a id="liveC" href="#" class="btn-m btn-call" style="width:120px; padding:12px;">📞 CALL</a>
                <a id="liveV" href="#" class="btn-m btn-viber" style="width:120px; padding:12px;">💜 VIBER</a>
            </div>
        </div>

        <div class="priority-box">
            <div id="wBox" class="p-card">
                <small style="text-transform:uppercase; font-size:9px; display:block; margin-bottom:10px; border-bottom:1px solid rgba(255,255,255,0.2); padding-bottom:5px; font-weight:800;">დასავლეთი</small>
                <div class="p-info">
                    <b>ზაალ გვეტაძე</b><br>568230917
                    <div style="margin-top:8px; display:flex; gap:5px; justify-content:center;">
                        <a href="tel:568230917" class="btn-m btn-call">📞</a>
                        <a href="viber://chat?number=%2B995568230917" class="btn-m btn-viber">💜</a>
                    </div>
                </div>
            </div>
            
            <div id="eBox" class="p-card">
                <small style="text-transform:uppercase; font-size:9px; display:block; margin-bottom:10px; border-bottom:1px solid rgba(255,255,255,0.2); padding-bottom:5px; font-weight:800;">აღმოსავლეთი</small>
                <div class="p-info">
                    <b>თემო გელაშვილი</b><br>577698890
                    <div style="margin-top:8px; display:flex; gap:5px; justify-content:center;">
                        <a href="tel:577698890" class="btn-m btn-call">📞</a>
                        <a href="viber://chat?number=%2B995577698890" class="btn-m btn-viber">💜</a>
                    </div>
                </div>
                <div class="p-info">
                    <b>უჩა მჭედლიშვილი</b><br>599470033
                    <div style="margin-top:8px; display:flex; gap:5px; justify-content:center;">
                        <a href="tel:599470033" class="btn-m btn-call">📞</a>
                        <a href="viber://chat?number=%2B995599470033" class="btn-m btn-viber">💜</a>
                    </div>
                </div>
            </div>
            
            <div id="cBox" class="p-card" style="background:#334155;">
                <small style="text-transform:uppercase; font-size:9px; font-weight:800;">📞 ქოლცენტრი</small>
                <b style="font-size:24px; margin:15px 0; display:block;">8888</b>
                <small>09:00 - 18:00</small>
            </div>
        </div>

        <div id="noteBox" style="display: none; padding: 20px; border-radius: 25px; background: rgb(241, 245, 249); font-weight: 800; font-size: 16px; margin-bottom: 25px;"></div>
        
        <div id="scheduleBody"></div>
    </div>

    <script>
        const schedule = [
            {"day":15,"person":{"name":"შალვა გაგნიძე","phone":"551770200"}},
            {"day":16,"person":{"name":"გუგა ბალანჩივაძე","phone":"577978792"}},
            {"day":17,"person":{"name":"ალიკა ყალიჩავა","phone":"551688899"}},
            {"day":18,"person":{"name":"გუგა ბალანჩივაძე","phone":"577978792"}},
            {"day":19,"person":{"name":"გიორგი ბოჭორიშვილი","phone":"591927831"}},
            {"day":20,"person":{"name":"გიორგი ლომიძე","phone":"555558222"}},
            {"day":21,"person":{"name":"ბექა ტალახაძე","phone":"551982772"}},
            {"day":22,"person":{"name":"გიორგი ბოჭორიშვილი","phone":"591927831"}},
            {"day":23,"person":{"name":"შალვა გაგნიძე","phone":"551770200"}},
            {"day":24,"person":{"name":"ვასილ გოგალაძე","phone":"557949827"}},
            {"day":25,"person":{"name":"შალვა გაგნიძე","phone":"551770200"}},
            {"day":26,"person":{"name":"გიორგი ლომიძე","phone":"555558222"}},
            {"day":27,"person":{"name":"გუგა ბალანჩივაძე","phone":"577978792"}},
            {"day":28,"person":{"name":"გიორგი ბოჭორიშვილი","phone":"591927831"}},
            {"day":29,"person":{"name":"ვასილ გოგალაძე","phone":"557949827"}},
            {"day":30,"person":{"name":"ალიკა ყალიჩავა","phone":"551688899"}},
            {"day":31,"person":{"name":"გიორგი ლომიძე","phone":"555558222"}}
        ];
        const months = ["იანვარი","თებერვალი","მარტი","აპრილი","მაისი","ივნისი","ივლისი","აგვისტო","სექტემბერი","ოქტომბერი","ნოემბერი","დეკემბერი"];
        const targetMonthStr = "2026-04";
        const [targetY, targetMStr] = targetMonthStr.split('-').map(Number);
        const targetM = targetMStr - 1;

        // 1. სიის დინამიური გენერაცია
        function renderSchedule() {
            const scheduleBody = document.getElementById('scheduleBody');
            scheduleBody.innerHTML = ''; 

            schedule.forEach(item => {
                const cleanPhone = item.person.phone.replace(/\s+/g, '');
                const viberPhone = cleanPhone.slice(-9); // ვიბერისთვის
                
                const rowHTML = `
                <div class="row" data-day="${item.day}">
                    <div><b>${item.day} ${months[targetM]}</b></div>
                    <div style="text-align:right">
                        <b style="font-size:16px; display:block; color:#0f172a; margin-bottom:4px;">${item.person.name}</b>
                        <div style="font-weight:900; color:#334155; font-size:14px; margin-bottom:5px;">${item.person.phone}</div>
                        <div style="display:flex; gap:3px; justify-content:flex-end;">
                            <a href="tel:${cleanPhone}" class="btn-m btn-call">📞 CALL</a>
                            <a href="viber://chat?number=%2B995${viberPhone}" class="btn-m btn-viber">💜 VIBER</a>
                        </div>
                    </div>
                </div>`;
                scheduleBody.insertAdjacentHTML('beforeend', rowHTML);
            });
        }

        // 2. დროის და მორიგეობის სინქრონიზაცია
        function updateLiveSync() {
            const now = new Date();
            const d = now.getDate();
            const m = now.getMonth();
            const y = now.getFullYear();
            
            const isTargetMonth = (y === targetY && m === targetM);
            const todayData = schedule.find(i => i.day === d);

            // მთავარი ბანერის განახლება
            if(isTargetMonth && todayData) {
                const cleanPhone = todayData.person.phone.replace(/\s+/g, '');
                
                document.getElementById('liveD').innerText = todayData.day + " " + months[targetM];
                document.getElementById('liveN').innerText = todayData.person.name;
                document.getElementById('liveP').innerText = todayData.person.phone;
                document.getElementById('liveP').href = "tel:" + cleanPhone;
                document.getElementById('liveC').href = "tel:" + cleanPhone;
                document.getElementById('liveV').href = "viber://chat?number=%2B995" + cleanPhone.slice(-9);
            } else {
                // თუ მიმდინარე დღე არ არის გრაფიკში
                document.getElementById('liveD').innerText = d + " " + months[m];
                document.getElementById('liveN').innerText = "მონაცემები არ არის";
                document.getElementById('liveP').innerText = "---";
            }

            // დღეების გაფილტვრა და მონიშვნა
            document.querySelectorAll('.row').forEach(row => {
                row.classList.remove('today-row');
                const rDay = parseInt(row.getAttribute('data-day'));
                
                if(isTargetMonth) {
                    if(rDay < d) { 
                        row.style.display = 'none'; // დამალე განვლილი დღეები
                    } else { 
                        row.style.display = 'flex'; 
                    }
                    
                    if(rDay === d) { 
                        row.classList.add('today-row'); // მონიშნე დღევანდელი
                    }
                } else {
                    row.style.display = 'flex'; // სხვა თვეში აჩვენე სრულად
                }
            });
        }

        // ინიციალიზაცია
        renderSchedule();
        updateLiveSync();
        
        // სინქრონიზაცია ყოველ 1 წუთში (60000ms)
        setInterval(updateLiveSync, 60000);
    </script>
</body>
</html>
